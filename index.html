<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Simple Snake - Eat Game</title>
<style>
  body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#111;color:#fff;font-family:sans-serif}
  #game{background:#000;border:4px solid #333}
  .info{position:fixed;top:10px;left:10px}
</style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<div class="info">Score: <span id="score">0</span> &nbsp; Controls: Arrow keys or WASD. Press Space to pause, R to restart</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const grid=20; // size of cells
const cols=canvas.width/grid;
const rows=canvas.height/grid;
let snake=[{x:10,y:10}];
let dir={x:0,y:0};
let apple=randomCell();
let score=0;
let running=true;
let speed=7; // frames per second
let lastTick=0;

function randomCell(){
  return {x:Math.floor(Math.random()*cols), y:Math.floor(Math.random()*rows)};
}

function loop(timestamp){
  if(!lastTick) lastTick=timestamp;
  const interval=1000/speed;
  if(timestamp-lastTick > interval){
    if(running) update();
    draw();
    lastTick=timestamp;
  }
  requestAnimationFrame(loop);
}

function update(){
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  // wrap-around
  if(head.x<0) head.x=cols-1;
  if(head.x>=cols) head.x=0;
  if(head.y<0) head.y=rows-1;
  if(head.y>=rows) head.y=0;
  // collision with self
  if(snake.some(s=>s.x===head.x && s.y===head.y)){
    running=false;
    return;
  }
  snake.unshift(head);
  if(head.x===apple.x && head.y===apple.y){
    score++;
    document.getElementById('score').textContent=score;
    apple=randomCell();
    // ensure apple not on snake
    while(snake.some(s=>s.x===apple.x && s.y===apple.y)) apple=randomCell();
  } else {
    snake.pop();
  }
}

function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // draw apple
  ctx.fillStyle='red';
  ctx.fillRect(apple.x*grid, apple.y*grid, grid, grid);
  // draw snake
  ctx.fillStyle='lime';
  for(let i=0;i<snake.length;i++){
    const s=snake[i];
    ctx.fillRect(s.x*grid, s.y*grid, grid-1, grid-1);
  }
  if(!running){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='white';
    ctx.font='20px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Game Over - Press R to Restart', canvas.width/2, canvas.height/2);
  }
}

window.addEventListener('keydown',e=>{
  const key=e.key;
  if(key==='ArrowUp' || key==='w' || key==='W'){ if(dir.y!==1){dir={x:0,y:-1}}}
  if(key==='ArrowDown' || key==='s' || key==='S'){ if(dir.y!==-1){dir={x:0,y:1}}}
  if(key==='ArrowLeft' || key==='a' || key==='A'){ if(dir.x!==1){dir={x:-1,y:0}}}
  if(key==='ArrowRight' || key==='d' || key==='D'){ if(dir.x!==-1){dir={x:1,y:0}}}
  if(key===' '){ running=!running } // space pause
  if(key==='r' || key==='R'){ restart(); }
});

function restart(){
  snake=[{x:10,y:10}];
  dir={x:0,y:0};
  apple=randomCell();
  score=0;
  document.getElementById('score').textContent=score;
  running=true;
}

requestAnimationFrame(loop);
</script>
</body>
</html>
